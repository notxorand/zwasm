name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  versions-lock-sync:
    # Mirrors Merge Gate item #9. Fails the PR if .github/versions.lock and
    # flake.nix disagree on a tool pin. Cheap (<1 sec) and runs in parallel
    # with the test matrix.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/sync-versions.sh

  # Linux + macOS test path uses the Nix devshell (W50 PR-B + PR-C).
  # The flake.nix provides version-pinned Zig / WASI SDK / wasm-tools
  # / wasmtime / TinyGo / Go / hyperfine — i.e. the same tools the
  # Mac/Linux `direnv allow` shell delivers locally — so this job
  # runs the `scripts/gate-commit.sh` Commit Gate verbatim. Rust
  # still comes from the runner image's pre-installed rustup; that's
  # the same split as developers using `rustup target add
  # wasm32-wasip1` on top of the Nix devshell.
  #
  # Windows uses `scripts/windows/install-tools.ps1` to provision the
  # same toolset (Zig / WASI SDK / wasm-tools / wasmtime / TinyGo /
  # Go / Rust) into `%LOCALAPPDATA%\zwasm-tools`, exposes them via
  # `$GITHUB_PATH` / `$GITHUB_ENV`, and then runs the same
  # `scripts/gate-commit.sh` entrypoint under Git Bash.
  test-nix:
    name: test (${{ matrix.os }}, nix devshell)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Magic Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Setup Rust (wasm32-wasip1 target)
        run: |
          source .github/versions.lock
          rustup install "$RUST_VERSION" --no-self-update
          rustup default "$RUST_VERSION"
          rustup target add wasm32-wasip1
          rustc --version

      - name: Cache Zig build artifacts
        uses: actions/cache@v4
        with:
          path: |
            .zig-cache
            zig-cache
            ~/.cache/zig
          key: zig-${{ runner.os }}-nix-${{ hashFiles('build.zig', 'build.zig.zon', 'src/**/*.zig') }}
          restore-keys: |
            zig-${{ runner.os }}-nix-

      - name: Run Commit Gate inside Nix devshell
        run: |
          nix develop --command bash -c '
            set -euo pipefail
            echo "=== devshell tool versions ==="
            zig version
            wasm-tools --version
            wasmtime --version
            echo "WASI_SDK_PATH=$WASI_SDK_PATH"
            export PATH="$HOME/.cargo/bin:$PATH"
            bash scripts/gate-commit.sh
          '

      # Extras the Commit Gate intentionally skips — these are
      # CI-specific quality gates that run after gate-commit.sh:
      # Zig-built C API tests (separate test program path from
      # FFI tests), static-link workflow, the Rust embedding
      # example, and a 4.5 MB peak-RSS check via /usr/bin/time.

      - name: Run C API tests (zig build c-test)
        run: nix develop --command zig build c-test

      # Order matters on Windows: `zig build static-lib` produces a
      # `zwasm.lib` that has the same filename as the shared-lib
      # import library written to `zig-out/lib/zwasm.lib`. Linux and
      # macOS use distinct extensions (`libzwasm.a` vs
      # `.so` / `.dylib`) and don't have this collision, but to keep
      # the order symmetric across all OSes the Rust dynamic example
      # runs *before* the static-lib build.

      - name: Run Rust FFI example (dynamic)
        run: |
          nix develop --command bash -c '
            export PATH="$HOME/.cargo/bin:$PATH"
            cd examples/rust && cargo run
          '

      - name: Build static library (PIC + compiler_rt)
        run: nix develop --command zig build static-lib -Dpic=true -Dcompiler-rt=true

      - name: Run static link tests
        run: nix develop --command bash test/c_api/run_static_link_test.sh

      - name: Memory usage check (POSIX)
        run: |
          BINARY=zig-out/bin/zwasm
          LIMIT_KB=4608  # 4.5 MB
          if [ "$(uname)" = "Darwin" ]; then
            MEM_OUTPUT=$(/usr/bin/time -l "$BINARY" --invoke sieve bench/wasm/sieve.wasm 1000000 2>&1 >/dev/null)
            MEM_BYTES=$(echo "$MEM_OUTPUT" | grep "maximum resident set size" | awk '{print $1}')
            MEM_KB=$((MEM_BYTES / 1024))
          else
            MEM_OUTPUT=$(/usr/bin/time -v "$BINARY" --invoke sieve bench/wasm/sieve.wasm 1000000 2>&1 >/dev/null)
            MEM_KB=$(echo "$MEM_OUTPUT" | grep "Maximum resident set size" | awk '{print $NF}')
          fi
          MEM_MB=$(python3 -c "print(f'{int(${MEM_KB}) / 1024:.2f}')")
          echo "Peak memory: ${MEM_MB} MB (${MEM_KB} KB)"
          if [ "$MEM_KB" -gt "$LIMIT_KB" ]; then
            echo "FAIL: Peak memory exceeds 4.5 MB limit"
            exit 1
          fi
          echo "PASS: Within 4.5 MB limit"

  test:
    name: test (windows-latest)
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Provision toolchain (install-tools.ps1)
        # install-tools.ps1 reads .github/versions.lock and provisions
        # Zig + WASI SDK + wasm-tools + wasmtime + Go + TinyGo + Rust
        # (rustup-init.exe with self-contained CARGO_HOME / RUSTUP_HOME)
        # into %LOCALAPPDATA%\zwasm-tools, exporting PATH / WASI_SDK_PATH
        # / CARGO_HOME / RUSTUP_HOME via $GITHUB_PATH and $GITHUB_ENV so
        # subsequent steps see them.
        shell: pwsh
        run: pwsh -NoLogo -File scripts/windows/install-tools.ps1

      - name: Cache Zig build artifacts
        uses: actions/cache@v4
        with:
          path: |
            .zig-cache
            zig-cache
            ~/AppData/Local/zig
          key: zig-Windows-installtools-${{ hashFiles('build.zig', 'build.zig.zon', 'src/**/*.zig') }}
          restore-keys: |
            zig-Windows-installtools-

      - name: Sanity-check provisioned toolchain
        run: |
          set -euo pipefail
          echo "=== install-tools.ps1 toolchain ==="
          zig version
          wasm-tools --version
          wasmtime --version
          rustc --version
          rustup target list --installed
          go version
          tinygo version
          echo "WASI_SDK_PATH=$WASI_SDK_PATH"

      - name: Run Commit Gate
        run: bash scripts/gate-commit.sh

      # Extras the Commit Gate intentionally skips — same set the
      # test-nix job runs on Linux/macOS.

      - name: Run C API tests (zig build c-test)
        run: zig build c-test

      # Order matters on Windows — see test-nix above. cargo run uses
      # the shared-lib import library at zig-out/lib/zwasm.lib; the
      # subsequent `zig build static-lib` would otherwise overwrite
      # it with the static archive (LNK1143 from MSVC link.exe).
      - name: Run Rust FFI example (dynamic)
        run: cd examples/rust && cargo run

      - name: Build static library (PIC + compiler_rt)
        run: zig build static-lib -Dpic=true -Dcompiler-rt=true

      - name: Run static link tests
        run: bash test/c_api/run_static_link_test.sh

      - name: Memory usage check (Windows)
        shell: pwsh
        run: |
          $LIMIT_KB = 4608   # 4.5 MB, same budget as POSIX path
          $tmpOut   = New-TemporaryFile
          $proc = Start-Process `
              -FilePath 'zig-out\bin\zwasm.exe' `
              -ArgumentList @('--invoke', 'sieve', 'bench\wasm\sieve.wasm', '1000000') `
              -PassThru -RedirectStandardOutput $tmpOut.FullName
          $peak = 0
          while (-not $proc.HasExited) {
              try { $proc.Refresh() } catch {}
              if ($proc.PeakWorkingSet64 -gt $peak) { $peak = $proc.PeakWorkingSet64 }
              Start-Sleep -Milliseconds 50
          }
          try { $proc.Refresh() } catch {}
          if ($proc.PeakWorkingSet64 -gt $peak) { $peak = $proc.PeakWorkingSet64 }
          Remove-Item $tmpOut -Force -ErrorAction SilentlyContinue
          if ($proc.ExitCode -ne 0) {
              Write-Host "zwasm.exe exited $($proc.ExitCode); cannot trust memory measurement"
              exit 1
          }
          $memKb = [int]($peak / 1024)
          $memMb = ('{0:F2}' -f ($memKb / 1024))
          Write-Host "Peak memory: $memMb MB ($memKb KB)"
          if ($memKb -gt $LIMIT_KB) {
              Write-Host "FAIL: Peak memory exceeds 4.5 MB limit"
              exit 1
          }
          Write-Host "PASS: Within 4.5 MB limit"

  size-matrix:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.16.0

      - name: Build size variants
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            BIN_NAME=zwasm.exe
          else
            BIN_NAME=zwasm
          fi
          echo "| Variant | Size (stripped) |"
          echo "|---------|----------------|"

          for variant in \
            "full:" \
            "no-jit:-Djit=false" \
            "no-component:-Dcomponent=false" \
            "no-wat:-Dwat=false" \
            "minimal:-Djit=false -Dcomponent=false -Dwat=false"
          do
            NAME="${variant%%:*}"
            FLAGS="${variant#*:}"
            echo "Building $NAME ($FLAGS)..."
            rm -rf ".strip-cache-$NAME"
            zig build -Dstrip=true -Doptimize=ReleaseSafe $FLAGS \
              --prefix ".strip-cache-$NAME"
            SIZE=$(wc -c < ".strip-cache-$NAME/bin/$BIN_NAME" | tr -d ' ')
            SIZE_KB=$((SIZE / 1024))
            echo "| $NAME | ${SIZE_KB} KB |"
          done

      - name: Verify minimal build tests pass
        run: zig build test -Djit=false -Dcomponent=false -Dwat=false

  # 3-OS bench matrix (C-g step 5, 2026-04-29). Each runner does its
  # own fresh measurement of base vs PR — never compared across
  # OSes / architectures because the hardware deltas dwarf any
  # codegen-level signal we could detect. The durable per-arch
  # baselines live in bench/history.yaml (see CLAUDE.md Merge Gate
  # item 10); CI exists to catch *intra-runner* regressions on PRs.
  benchmark:
    name: benchmark (${{ matrix.os }})
    needs: [test-nix, test]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Linux / macOS — nix devshell brings zig + hyperfine.
      - name: Install Nix
        if: runner.os != 'Windows'
        uses: DeterminateSystems/nix-installer-action@main

      - name: Magic Nix cache
        if: runner.os != 'Windows'
        uses: DeterminateSystems/magic-nix-cache-action@main

      # Windows — install-tools.ps1 brings zig + hyperfine via
      # `versions.lock` pins, exposing them through $GITHUB_PATH so
      # subsequent bash steps see them. `-OnlyTool` arms keep the
      # bench job from pulling Go / TinyGo / Rust / WASI SDK that
      # the realworld test job needs but the benchmarks do not.
      - name: Provision toolchain (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          pwsh -NoLogo -File scripts/windows/install-tools.ps1 -OnlyTool zig
          pwsh -NoLogo -File scripts/windows/install-tools.ps1 -OnlyTool hyperfine

      - name: Cache Zig build artifacts
        uses: actions/cache@v4
        with:
          path: |
            .zig-cache
            zig-cache
            ~/.cache/zig
            ~/AppData/Local/zig
          key: zig-${{ runner.os }}-bench-${{ hashFiles('build.zig', 'build.zig.zon', 'src/**/*.zig') }}
          restore-keys: |
            zig-${{ runner.os }}-bench-

      - name: Build ReleaseSafe
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            zig build -Doptimize=ReleaseSafe
          else
            nix develop --command zig build -Doptimize=ReleaseSafe
          fi

      - name: Benchmark regression check
        if: github.event_name == 'pull_request'
        # Soft-fail (continue-on-error) so noisy single-bench wobbles do
        # not block PRs. Real regressions surface as repeated reds
        # across PRs and are flagged in the PR check log; the durable
        # per-arch baselines live in bench/history.yaml (recorded
        # locally, see CLAUDE.md Merge Gate item 10). Each runner
        # measures fresh base + PR builds on the same host, so the
        # comparison is intra-runner only — never mix the three
        # series.
        continue-on-error: true
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            bash bench/ci_compare.sh --base=origin/main --threshold=20 --runs=3 --warmup=1 --skip-build
          else
            nix develop --command bash bench/ci_compare.sh --base=origin/main --threshold=20 --runs=3 --warmup=1 --skip-build
          fi

      - name: Benchmark record (main push)
        if: github.event_name == 'push'
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            bash bench/ci_compare.sh --record-only --runs=3 --warmup=1 --skip-build
          else
            nix develop --command bash bench/ci_compare.sh --record-only --runs=3 --warmup=1 --skip-build
          fi

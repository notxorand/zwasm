name: SpecTec Monitor

on:
  schedule:
    - cron: '0 6 * * 1'  # Monday 06:00 UTC (weekly)
  workflow_dispatch:

permissions:
  issues: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for spec changes
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SINCE=$(date -u -d '7 days ago' +%Y-%m-%dT%H:%M:%SZ 2>/dev/null \
            || date -u -v-7d +%Y-%m-%dT%H:%M:%SZ)

          # Clone and check for changes in spec-relevant directories
          git clone --depth 50 --filter=blob:none --sparse \
            https://github.com/WebAssembly/spec.git /tmp/spec-check
          cd /tmp/spec-check
          git sparse-checkout set document/core spectec

          CHANGES=$(git log --since="$SINCE" --oneline --all -- document/core/ spectec/ 2>/dev/null || echo "")

          if [ -z "$CHANGES" ]; then
            echo "No changes in document/core/ or spectec/"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "Found spec changes:"
            echo "$CHANGES"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            {
              echo 'changes<<CHANGES_EOF'
              echo "$CHANGES"
              echo 'CHANGES_EOF'
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Check for existing issue
        if: steps.check.outputs.has_changes == 'true'
        id: dedup
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          WEEK=$(date -u +%Y-W%V)
          EXISTING=$(gh issue list --label "spectec" --state open --search "SpecTec $WEEK" --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            echo "Issue already exists: #$EXISTING"
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create issue
        if: steps.check.outputs.has_changes == 'true' && steps.dedup.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHANGES: ${{ steps.check.outputs.changes }}
        run: |
          WEEK=$(date -u +%Y-W%V)
          gh issue create \
            --title "SpecTec changes detected ($WEEK)" \
            --label "spectec" \
            --body "$(cat <<BODY_EOF
          Recent changes in \`document/core/\` or \`spectec/\` directories:

          \`\`\`
          $CHANGES
          \`\`\`

          Review for potential impact on zwasm spec compliance.
          BODY_EOF
          )"

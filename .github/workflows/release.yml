name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    defaults:
      run:
        shell: bash
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-macos
            artifact: zwasm-macos-aarch64
            package: tar.gz
          - os: ubuntu-latest
            target: x86_64-linux
            artifact: zwasm-linux-x86_64
            package: tar.gz
          - os: ubuntu-latest
            target: aarch64-linux
            artifact: zwasm-linux-aarch64
            package: tar.gz
          - os: windows-latest
            target: x86_64-windows
            artifact: zwasm-windows-x86_64
            package: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build ReleaseSafe
        env:
          ZIG_TARGET: ${{ matrix.target }}
        run: zig build -Doptimize=ReleaseSafe -Dtarget="$ZIG_TARGET"

      - name: Package binary
        env:
          ARTIFACT_NAME: ${{ matrix.artifact }}
          PACKAGE_EXT: ${{ matrix.package }}
        run: |
          mkdir -p dist
          checksum() {
            if command -v sha256sum >/dev/null 2>&1; then
              sha256sum "$1" > "$1.sha256"
            else
              shasum -a 256 "$1" > "$1.sha256"
            fi
          }
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp zig-out/bin/zwasm.exe dist/zwasm.exe
            cd dist
            powershell -Command "Compress-Archive -Path zwasm.exe -DestinationPath '${ARTIFACT_NAME}.zip'"
            checksum "${ARTIFACT_NAME}.zip"
          else
            cp zig-out/bin/zwasm dist/zwasm
            cd dist
            tar czf "${ARTIFACT_NAME}.tar.gz" zwasm
            checksum "${ARTIFACT_NAME}.tar.gz"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create checksums
        run: |
          cd artifacts
          find . -name '*.sha256' -exec cat {} \; > ../SHA256SUMS
          cd ..
          find artifacts -name '*.tar.gz' -exec mv {} . \;
          find artifacts -name '*.zip' -exec mv {} . \;

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" \
            --title "$TAG_NAME" \
            --generate-notes \
            *.tar.gz *.zip SHA256SUMS

name: wasm-tools Bump

on:
  schedule:
    - cron: '0 5 1 * *'  # 1st of month 05:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for new wasm-tools version
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          source .github/tool-versions
          CURRENT="$WASM_TOOLS_VERSION"
          LATEST=$(gh api repos/bytecodealliance/wasm-tools/releases/latest --jq '.tag_name' | sed 's/^v//')
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          if [ "$CURRENT" = "$LATEST" ]; then
            echo "Already up to date: $CURRENT"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Update available: $CURRENT -> $LATEST"
            sed -i "s/WASM_TOOLS_VERSION=.*/WASM_TOOLS_VERSION=$LATEST/" .github/tool-versions
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Zig
        if: steps.check.outputs.changed == 'true'
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install new wasm-tools
        if: steps.check.outputs.changed == 'true'
        run: |
          source .github/tool-versions
          ARCH=$(uname -m)
          curl -L -o /tmp/wasm-tools.tar.gz \
            "https://github.com/bytecodealliance/wasm-tools/releases/download/v${WASM_TOOLS_VERSION}/wasm-tools-${WASM_TOOLS_VERSION}-${ARCH}-linux.tar.gz"
          tar xzf /tmp/wasm-tools.tar.gz -C /tmp
          echo "/tmp/wasm-tools-${WASM_TOOLS_VERSION}-${ARCH}-linux" >> "$GITHUB_PATH"

      - name: Download spec testsuite
        if: steps.check.outputs.changed == 'true'
        run: git clone --depth 1 https://github.com/WebAssembly/spec.git /tmp/wasm-spec

      - name: Convert and run spec tests
        if: steps.check.outputs.changed == 'true'
        run: |
          bash test/spec/convert.sh /tmp/wasm-spec/test/core
          zig build test
          python3 test/spec/run_spec.py --build --summary --strict

      - name: Create PR
        if: steps.check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LATEST: ${{ steps.check.outputs.latest }}
          CURRENT: ${{ steps.check.outputs.current }}
        run: |
          BRANCH="auto/wasm-tools-${LATEST}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add .github/tool-versions
          git commit -m "Bump wasm-tools ${CURRENT} -> ${LATEST}"
          git push --force-with-lease origin "$BRANCH"
          EXISTING=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -z "$EXISTING" ]; then
            gh pr create \
              --title "Bump wasm-tools to ${LATEST}" \
              --body "Automated wasm-tools update from ${CURRENT} to ${LATEST}. All tests pass." \
              --base main
          else
            echo "PR #$EXISTING already exists for $BRANCH"
          fi

name: Spec Bump

on:
  schedule:
    - cron: '0 4 * * 1'  # Monday 04:00 UTC (weekly)
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update spec testsuite
        id: update
        run: |
          git clone --depth 1 https://github.com/WebAssembly/spec.git /tmp/wasm-spec-new
          NEW_SHA=$(git -C /tmp/wasm-spec-new rev-parse --short HEAD)
          echo "new_sha=$NEW_SHA" >> "$GITHUB_OUTPUT"

          # Compare with last known spec SHA (stored in a marker file)
          MARKER=".github/spec-sha"
          OLD_SHA=""
          if [ -f "$MARKER" ]; then
            OLD_SHA=$(cat "$MARKER")
          fi

          if [ "$NEW_SHA" = "$OLD_SHA" ]; then
            echo "No spec changes"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "$NEW_SHA" > "$MARKER"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Zig
        if: steps.update.outputs.changed == 'true'
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install wasm-tools
        if: steps.update.outputs.changed == 'true'
        run: |
          source .github/tool-versions
          ARCH=$(uname -m)
          curl -L -o /tmp/wasm-tools.tar.gz \
            "https://github.com/bytecodealliance/wasm-tools/releases/download/v${WASM_TOOLS_VERSION}/wasm-tools-${WASM_TOOLS_VERSION}-${ARCH}-linux.tar.gz"
          tar xzf /tmp/wasm-tools.tar.gz -C /tmp
          echo "/tmp/wasm-tools-${WASM_TOOLS_VERSION}-${ARCH}-linux" >> "$GITHUB_PATH"

      - name: Convert and run spec tests
        if: steps.update.outputs.changed == 'true'
        run: |
          bash test/spec/convert.sh /tmp/wasm-spec-new/test/core
          zig build test
          python3 test/spec/run_spec.py --build --summary --strict

      - name: Create PR
        if: steps.update.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_SHA: ${{ steps.update.outputs.new_sha }}
        run: |
          BRANCH="auto/spec-bump-${NEW_SHA}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add .github/spec-sha
          git commit -m "Bump spec testsuite to ${NEW_SHA}"
          git push origin "$BRANCH"
          gh pr create \
            --title "Bump spec testsuite to ${NEW_SHA}" \
            --body "Automated spec testsuite update. All tests pass." \
            --base main
